<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --email-accent: #3b82f6;
            --email-hover: #2563eb;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        body {
            width: 320px;
            margin: 0;
            padding: 24px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            box-sizing: border-box;
            border-radius: 30px;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 20px;
        }

        h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #e2e8f0, #cbd5e1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glimpse Section */
        .glimpse-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .site-favicon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            object-fit: contain;
            padding: 6px;
            box-sizing: border-box;
        }

        .site-info {
            overflow: hidden;
            flex: 1;
        }

        .site-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
            color: #fff;
        }

        .site-domain {
            font-size: 12px;
            color: var(--text-dim);
            font-family: 'Fira Code', monospace;
        }

        /* Section Label */
        .section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        /* Buttons Container */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 8px;
        }

        .scan-btn {
            width: 100%;
            padding: 13px 16px;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .scan-btn:hover {
            transform: translateY(-2px);
        }

        .scan-btn:active {
            transform: scale(0.98);
        }

        /* Website Scan Button */
        .scan-web-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .scan-web-btn:hover {
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.5);
        }

        /* Email Scan Button */
        .scan-email-btn {
            background: linear-gradient(135deg, var(--email-accent) 0%, var(--email-hover) 100%);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .scan-email-btn:hover {
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.5);
        }

        /* Gmail detected hint */
        .gmail-hint {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            margin-bottom: 14px;
        }

        .gmail-hint.visible {
            display: flex;
        }

        .gmail-hint svg {
            flex-shrink: 0;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer {
            font-size: 11px;
            text-align: center;
            color: var(--text-dim);
            margin-top: 16px;
            opacity: 0.5;
            letter-spacing: 0.5px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="brand">
            <span class="logo-icon">🛡️</span>
            <h3>Threat Lens</h3>
        </div>
        <div class="status-badge">
            <div class="pulse-dot"></div>
            <span>Active</span>
        </div>
    </div>

    <div class="glimpse-box">
        <img id="favicon" src="" alt="" class="site-favicon" onerror="this.style.opacity='0'">
        <div class="site-info">
            <div id="siteTitle" class="site-title">Detecting Tab...</div>
            <div id="siteDomain" class="site-domain">waiting...</div>
        </div>
    </div>

    <!-- Gmail detected hint -->
    <div id="gmailHint" class="gmail-hint">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
        </svg>
        <span>Gmail detected — Open an email and use <strong>Scan Email</strong> to check it!</span>
    </div>

    <div class="btn-group">
        <!-- Scan Website Button -->
        <div class="section-label">🌐 Website Security</div>
        <button id="scanWebBtn" class="scan-btn scan-web-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                </path>
            </svg>
            Scan Website
        </button>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">or</span>
            <div class="divider-line"></div>
        </div>

        <!-- Scan Email Button -->
        <div class="section-label">📧 Email Phishing Check</div>
        <button id="scanEmailBtn" class="scan-btn scan-email-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </svg>
            Scan Email
        </button>
    </div>

    <div class="footer">
        Powered by F.R.I.D.A.Y
    </div>
    <script src="popup.js"></script>
</body>

</html>
